name: AI Custom Review

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  push:
    branches:
      - main

permissions:
  pull-requests: write
  contents: read

jobs:
  custom-review:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ vars.DOCKER_USERNAME }}/custom-ai-review-image:v1
      IMAGE_PLATFORM: linux/amd64
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Pull and run custom review container
        run: |
          docker pull --platform "$IMAGE_PLATFORM" "$IMAGE_NAME"
          docker run --rm --platform "$IMAGE_PLATFORM" "$IMAGE_NAME"
      - name: Comment PR
        if: github.event.pull_request != null
        uses: thollander/actions-comment-pull-request@v3
        with:
          message: |
            Hello!
          pr-number: ${{ github.event.pull_request.number }}

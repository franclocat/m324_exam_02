name: AI Custom Review

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  push:
    branches:
      - main

jobs:
  custom-review:
    if: true
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ vars.DOCKER_USERNAME }}/custom-ai-review-image:v1
      IMAGE_PLATFORM: linux/amd64
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Pull and run custom review container
        run: |
          docker pull --platform "$IMAGE_PLATFORM" "$IMAGE_NAME"
          docker run --rm --platform "$IMAGE_PLATFORM" "$IMAGE_NAME"
      - name: Comment PR
        uses: thollander/actions-comment-pull-request@v3
        with:
          message: |
            'Hello!'

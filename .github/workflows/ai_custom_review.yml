name: AI Custom Review

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  push:
    branches:
      - main

jobs:
  custom-review:
    runs-on: ubuntu-latest
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Pull and run custom review container
        run: |
          docker pull ${{ vars.DOCKER_USERNAME }}/custom-ai-review-image:latest
          docker run --rm ${{ vars.DOCKER_USERNAME }}/custom-ai-review-image:latest
